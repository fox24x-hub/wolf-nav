<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Степной Волк 2026 — Навигатор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #f0f6fc;
      --muted: #8b949e;
      --primary: #3fb950;
      --accent: #f0883e;
      --danger: #f85149;
      --warn: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --d1: #3b82f6;
      --d2: #10b981;
      --d3: #ef4444;
      --radius: 14px;
      /* alias для stop-card */
      --color-surface: #161b22;
      --color-surface-2: #21262d;
      --color-border: #30363d;
      --color-text-muted: #8b949e;
      --color-primary: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ===== LAYOUT ===== */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ===== TOP HUD ===== */
    .hud-top {
      position: relative; z-index: 500;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      flex-shrink: 0;
    }
    .hud-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; white-space: nowrap; }
    .hud-logo span { color: var(--accent); }
    .hud-spacer { flex: 1; }
    .hud-speed {
      display: flex; flex-direction: column; align-items: center;
      background: var(--surface2); border-radius: 10px; padding: 0.3rem 0.7rem; min-width: 60px;
    }
    .hud-speed .val { font-size: 1.4rem; font-weight: 700; color: var(--primary); line-height: 1; }
    .hud-speed .unit { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
    .btn-drive {
      background: var(--primary); color: #000; border: none; border-radius: 10px;
      padding: 0.5rem 1rem; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-drive.active { background: var(--danger); color: #fff; }
    .btn-drive:hover { opacity: 0.85; }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-wrap { height: 3px; background: var(--surface2); flex-shrink: 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--d1), var(--d2), var(--d3)); transition: width 0.5s; }

    /* ===== TAB BAR ===== */
    .tab-bar {
      display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 400;
    }
    .tab-btn {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; border: none; background: transparent; color: var(--muted);
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ===== VIEWS ===== */
    .view { display: none; flex: 1; overflow: hidden; position: relative; }
    .view.active { display: flex; flex-direction: column; }

    /* ===== MAP VIEW ===== */
    #view-map { position: relative; }
    .map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ===== NEXT POINT CARD ===== */
    .next-card {
      position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
      z-index: 600; background: rgba(22,27,34,0.96); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.25rem; min-width: 300px; max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: all 0.3s;
    }
    .next-card .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
    .next-card .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .next-card .meta { display: flex; gap: 1rem; }
    .next-card .meta-item { display: flex; flex-direction: column; }
    .next-card .meta-item .mv { font-size: 1rem; font-weight: 700; color: var(--blue); }
    .next-card .meta-item .mk { font-size: 0.65rem; color: var(--muted); }
    .next-card .desc { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; border-top: 1px solid var(--border); padding-top: 0.5rem; }

    /* ===== BOTTOM CONTROLS ===== */
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 600;
      background: linear-gradient(transparent, rgba(13,17,23,0.98) 30%);
      padding: 1.5rem 1rem 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .waypoints-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .waypoints-scroll::-webkit-scrollbar { display: none; }
    .wp-chip {
      flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.4rem 0.75rem; font-size: 0.75rem; cursor: pointer;
      transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 0.4rem;
    }
    .wp-chip:hover { border-color: var(--blue); }
    .wp-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .wp-chip.passed { opacity: 0.4; }
    .wp-chip.current { border-color: var(--primary); color: var(--primary); }
    .wp-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .nav-controls { display: flex; gap: 0.75rem; align-items: center; }
    .btn-nav {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; padding: 0.75rem 1.25rem; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; flex: 1; text-align: center;
    }
    .btn-nav:hover { background: var(--surface); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }
    .btn-nav.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-nav.primary:hover { background: #4f9cff; }
    .btn-gps {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem; cursor: pointer; transition: all 0.2s;
      font-size: 1.1rem; line-height: 1;
    }
    .btn-gps.active { background: var(--primary); border-color: var(--primary); }

    /* ===== GPS STATUS BAR ===== */
    .gps-bar {
      position: absolute; top: 0.75rem; right: 0.75rem; z-index: 600;
      background: rgba(22,27,34,0.9); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.35rem 0.65rem;
      font-size: 0.7rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .gps-dot.ok { background: var(--primary); animation: pulse 2s infinite; }
    .gps-dot.searching { background: var(--warn); animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ===== VOICE TOAST ===== */
    .voice-toast {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 700; background: rgba(22,27,34,0.95); border: 1px solid var(--primary);
      border-radius: var(--radius); padding: 1rem 1.5rem; font-size: 1rem; font-weight: 600;
      text-align: center; color: var(--primary); pointer-events: none;
      opacity: 0; transition: opacity 0.3s; max-width: 80vw;
    }
    .voice-toast.show { opacity: 1; }

    /* ===== ARRIVAL BANNER ===== */
    .arrival-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 800; background: var(--surface); border: 2px solid var(--primary);
      border-radius: var(--radius); padding: 2rem; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7); display: none;
    }
    .arrival-banner h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 0.5rem; }
    .arrival-banner p { color: var(--muted); font-size: 0.9rem; }
    .arrival-banner .btn-close { margin-top: 1rem; background: var(--primary); color: #000; border: none; border-radius: 10px; padding: 0.6rem 1.5rem; font-weight: 700; cursor: pointer; }

    /* ===== PULSE MARKER ===== */
    .pulse-ring {
      border-radius: 50%; background: rgba(63,185,80,0.25);
      width: 40px; height: 40px; position: absolute;
      top: -15px; left: -15px;
      animation: ring 2s ease-out infinite;
    }
    @keyframes ring { 0%{transform:scale(0.5);opacity:1} 100%{transform:scale(2);opacity:0} }

    /* ===== LEAFLET OVERRIDES ===== */
    .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 10px; }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 12px 16px; font-family: 'Inter', sans-serif; font-size: 0.85rem; }
    .leaflet-popup-content b { color: var(--blue); }

    /* ===== STOPS VIEW ===== */
    #view-stops { overflow-y: auto; }
    .stops-view-inner { padding: 1rem; max-width: 680px; margin: 0 auto; }

    .stops-section { display: grid; gap: 18px; }
    .section-head { margin-bottom: 4px; }
    .section-head h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .eyebrow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
    .section-head p { color: var(--color-text-muted); font-size: 0.85rem; margin-top: 6px; }

    .stops-list { display: grid; gap: 16px; }
    .stop-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 20px;
      display: grid;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .stop-card__top {
      display: flex; justify-content: space-between; align-items: start; gap: 12px;
    }
    .stop-card__day {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--color-text-muted); margin-bottom: 4px;
    }
    .stop-card__title { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .stop-card__badge {
      padding: 6px 12px; border-radius: 999px; font-size: 11px;
      font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .stop-card__badge--high { background: rgba(63,185,80,.15); color: var(--primary); }
    .stop-card__badge--medium { background: rgba(240,136,62,.15); color: var(--accent); }
    .stop-card__route-role { color: var(--color-primary); font-weight: 600; font-size: 0.85rem; }
    .stop-card__brief { color: var(--color-text-muted); margin: 0; font-size: 0.85rem; line-height: 1.5; }
    .stop-card__details {
      border-top: 1px solid var(--color-border); padding-top: 12px;
    }
    .stop-card__details summary {
      cursor: pointer; font-weight: 700; font-size: 0.85rem; margin-bottom: 10px;
      color: var(--blue); list-style: none; display: flex; align-items: center; gap: 6px;
    }
    .stop-card__details summary::before { content: '▶'; font-size: 0.6rem; transition: transform 0.2s; }
    .stop-card__details[open] summary::before { transform: rotate(90deg); }
    .stop-card__details p { color: var(--color-text-muted); margin: 0; font-size: 0.85rem; line-height: 1.6; }
    .stop-card__grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .stop-card__grid h4 { margin: 0 0 8px; font-size: 0.8rem; color: var(--text); }
    .stop-card__grid ul {
      margin: 0; padding-left: 16px; color: var(--color-text-muted); font-size: 0.8rem; line-height: 1.7;
    }
    .stop-card__meta {
      display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.75rem;
      color: var(--color-text-muted); padding-top: 10px; border-top: 1px solid var(--color-border);
    }
    .stop-card__meta span {
      background: var(--surface2); border-radius: 8px; padding: 4px 10px;
    }
    .stop-card__audio {
      padding: 12px 14px; border-radius: 14px;
      background: var(--color-surface-2); border: 1px solid var(--color-border);
    }
    .stop-card__audio strong { display: block; margin-bottom: 4px; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stop-card__audio p { margin: 0; color: var(--text); font-size: 0.88rem; line-height: 1.5; font-style: italic; }

    .stop-card__map-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue); color: #fff; border: none; border-radius: 10px;
      padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .stop-card__map-btn:hover { background: #4f9cff; }

    @media (max-width: 640px) {
      .stop-card__grid { grid-template-columns: 1fr; }
      .stop-card__top { flex-direction: column; }
      .next-card { min-width: 85vw; }
      .hud-logo { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP HUD -->
  <div class="hud-top">
    <div class="hud-logo">Степной <span>Волк</span> 2026</div>
    <div class="hud-spacer"></div>

      <div class="val" id="speedVal">—</div>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('map')">🗺 Карта</button>
    <button class="tab-btn" onclick="switchTab('stops')">📍 Остановки</button>
  </div>

  <!-- MAP VIEW -->
  <div class="view active" id="view-map">
    <div class="map-wrap">
      <div id="map"></div>

      <div class="next-card" id="nextCard">
        <div class="label">Следующая точка</div>

        <div class="meta" id="nextMeta"></div>
        <div class="desc" id="nextDesc"></div>
      </div>

      <div class="gps-bar" id="gpsBar">

        <span id="gpsText">GPS выкл</span>

      <div class="voice-toast" id="voiceToast"></div>

      <div class="arrival-banner" id="arrivalBanner">
        <div style="font-size:2.5rem">🏁</div>
        <h2 id="arrivalTitle">Прибыли!</h2>
        <p id="arrivalDesc"></p>
        <button class="btn-close" onclick="closeArrival()">Продолжить</button>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="waypoints-scroll" id="wpScroll"></div>
      <div class="nav-controls">
        <button class="btn-nav" id="btnPrev" onclick="prevStop()" disabled>← Назад</button>
        <button class="btn-gps" id="btnGps" onclick="toggleGps()">📍</button>
        <button class="btn-nav primary" id="btnNext" onclick="nextStop()">Далее →</button>
      </div>
    </div>
  </div>

  <!-- STOPS VIEW -->
  <div class="view" id="view-stops">
    <div class="stops-view-inner">
      <section class="stops-section">
        <div class="section-head">
          <div class="eyebrow">Дорожный гид</div>
          <h2>Остановки по пути</h2>
          <p>Короткие истории и подсказки для остановок 15–16 мая перед стартом «Степного волка».</p>
        </div>
        <div id="stops-list" class="stops-list"></div>
      </section>
    </div>
  </div>

</div>

/* ===== ЦВЕТА ТИПОВ ===== */
const typeColors = {
  nature: '#3fb950',
  history: '#f0883e',
  city: '#58a6ff',
  start: '#8b949e'
};

/* ===== СОСТОЯНИЕ ===== */
let currentIdx = 0;
let driveMode = false;
let gpsActive = false;
let watchId = null;
let userMarker = null;
let map = null;
let routeLine = null;
const markers = [];

/* ===== КАРТА ===== */
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([54.0, 57.5], 6);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  // Маршрутная линия
  const routeCoords = tripStops.map(s => s.coords);
  routeLine = L.polyline(routeCoords, {
    color: '#58a6ff', weight: 2.5, opacity: 0.5, dashArray: '6 6'
  }).addTo(map);

  // Маркеры
  tripStops.forEach((stop, idx) => {
    const color = typeColors[stop.type] || '#58a6ff';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color}; width:14px; height:14px; border-radius:50%;
        border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.5);
        cursor:pointer;
      "></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    const marker = L.marker(stop.coords, { icon })
      .addTo(map)
      .bindPopup(`<b>${stop.title}</b><br>${stop.routeRole}<br><small>⏱ ${stop.duration}</small>`);
    marker.on('click', () => jumpToStop(idx));
    markers.push(marker);
  });

  renderWaypoints();
  jumpToStop(0);
}

/* ===== НАВИГАЦИЯ ===== */
function jumpToStop(idx) {
  currentIdx = idx;
  const stop = tripStops[idx];

  map.flyTo(stop.coords, idx === 0 ? 6 : 10, { duration: 1 });

  document.getElementById('nextTitle').textContent = stop.title;
  document.getElementById('nextDesc').textContent = stop.brief;
  document.getElementById('nextMeta').innerHTML = `
    <div class="meta-item"><span class="mv">${stop.day}</span><span class="mk">Дата</span></div>
    <div class="meta-item"><span class="mv">${stop.duration}</span><span class="mk">Время</span></div>
  `;

  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === tripStops.length - 1;

  updateProgress();
  renderWaypoints();
  markers.forEach((m, i) => {
    m.setOpacity(i < idx ? 0.35 : 1);
  });
}

function nextStop() {
  if (currentIdx < tripStops.length - 1) jumpToStop(currentIdx + 1);
}
function prevStop() {
  if (currentIdx > 0) jumpToStop(currentIdx - 1);
}

function updateProgress() {
  const pct = (currentIdx / (tripStops.length - 1)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderWaypoints() {
  const el = document.getElementById('wpScroll');
  el.innerHTML = tripStops.map((s, i) => {
    let cls = 'wp-chip';
    if (i < currentIdx) cls += ' passed';
    if (i === currentIdx) cls += ' current';
    if (i > currentIdx) cls += '';
    const color = typeColors[s.type] || '#58a6ff';
    return `<div class="${cls}" onclick="jumpToStop(${i})">
      <div class="wp-dot" style="background:${color}"></div>
      ${s.title}
    </div>`;
  }).join('');
  // скролл к текущей точке
  const chips = el.querySelectorAll('.wp-chip');
  if (chips[currentIdx]) chips[currentIdx].scrollIntoView({ behavior: 'smooth', inline: 'center' });
}

/* ===== DRIVE MODE ===== */
function toggleDriveMode() {
  driveMode = !driveMode;
  const btn = document.getElementById('btnDrive');
  const speedBlock = document.getElementById('speedBlock');
  if (driveMode) {
    btn.textContent = '⏹ Стоп';
    btn.classList.add('active');
    speedBlock.style.display = 'flex';
    showToast('Режим движения включён');
  } else {
    btn.textContent = '▶ Старт';
    btn.classList.remove('active');
    speedBlock.style.display = 'none';
    document.getElementById('speedVal').textContent = '—';
  }
}

/* ===== GPS ===== */
function toggleGps() {
  if (gpsActive) {
    stopGps();
  } else {
    startGps();
  }
}

function startGps() {
  if (!navigator.geolocation) {
    showToast('GPS недоступен в этом браузере');
    return;
  }
  gpsActive = true;
  document.getElementById('btnGps').classList.add('active');
  document.getElementById('gpsDot').className = 'gps-dot searching';
  document.getElementById('gpsText').textContent = 'Поиск…';

  watchId = navigator.geolocation.watchPosition(onGpsSuccess, onGpsError, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 10000
  });
}

function stopGps() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  gpsActive = false;
  document.getElementById('btnGps').classList.remove('active');
  document.getElementById('gpsDot').className = 'gps-dot';
  document.getElementById('gpsText').textContent = 'GPS выкл';
  document.getElementById('speedVal').textContent = '—';
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
}

function onGpsSuccess(pos) {
  const { latitude: lat, longitude: lng, speed } = pos.coords;
  document.getElementById('gpsDot').className = 'gps-dot ok';
  document.getElementById('gpsText').textContent = 'GPS активен';

  const kmh = speed ? Math.round(speed * 3.6) : 0;
  if (driveMode) document.getElementById('speedVal').textContent = kmh;

  const pulseHtml = `<div style="position:relative;width:10px;height:10px">
    <div class="pulse-ring"></div>
    <div style="width:10px;height:10px;background:var(--primary);border-radius:50%;border:2px solid #fff"></div>
  </div>`;
  const userIcon = L.divIcon({ className: '', html: pulseHtml, iconSize: [10,10], iconAnchor: [5,5] });

  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
  }

  if (driveMode) map.panTo([lat, lng]);

  // Проверка прибытия к точке
  const stop = tripStops[currentIdx];
  const dist = map.distance([lat, lng], stop.coords);
  if (dist < 300) {
    showArrival(stop);
  }
}

function onGpsError(err) {
  document.getElementById('gpsDot').className = 'gps-dot';
  document.getElementById('gpsText').textContent = 'Нет сигнала';
}

/* ===== ARRIVAL ===== */
function showArrival(stop) {
  document.getElementById('arrivalTitle').textContent = stop.title;
  document.getElementById('arrivalDesc').textContent = stop.audioNote;
  document.getElementById('arrivalBanner').style.display = 'block';
}
function closeArrival() {
  document.getElementById('arrivalBanner').style.display = 'none';
  if (currentIdx < tripStops.length - 1) nextStop();
}

/* ===== TOAST ===== */
function showToast(msg) {
  const t = document.getElementById('voiceToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== TABS ===== */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'map' && i === 0) || (tab === 'stops' && i === 1));
  });
  document.getElementById('view-map').classList.toggle('active', tab === 'map');
  document.getElementById('view-stops').classList.toggle('active', tab === 'stops');
  if (tab === 'map' && map) setTimeout(() => map.invalidateSize(), 50);
}

/* ===== STOP CARDS ===== */
function getPriorityLabel(priority) {
  if (priority === 'high') return 'Главная точка';
  if (priority === 'medium') return 'Остановка';
  return '';
}

function renderStopCard(stop) {
  if (stop.hideCard) return '';
  const badge = getPriorityLabel(stop.priority);
  const badgeHtml = badge
    ? `<span class="stop-card__badge stop-card__badge--${stop.priority}">${badge}</span>`
    : '';
  return `
    <article class="stop-card" id="card-${stop.id}">
      <div class="stop-card__top">
        <div>
          <div class="stop-card__day">${stop.day}</div>
          <h3 class="stop-card__title">${stop.title}</h3>
        </div>
        ${badgeHtml}
      </div>
      <p class="stop-card__route-role">${stop.routeRole}</p>
      <p class="stop-card__brief">${stop.brief}</p>
      <details class="stop-card__details">
        <summary>Что рассказать в машине</summary>
        <p>${stop.guideText}</p>
      </details>
      <div class="stop-card__grid">
        <section>
          <h4>На что смотреть</h4>
          <ul>${stop.lookFor.map(i => `<li>${i}</li>`).join('')}</ul>
        </section>
        <section>
          <h4>Практика</h4>
          <ul>${stop.practical.map(i => `<li>${i}</li>`).join('')}</ul>
        </section>
      </div>
      <div class="stop-card__audio">
        <strong>Фраза для дороги</strong>
        <p>${stop.audioNote}</p>
      </div>
      <div class="stop-card__meta">
        <span>⏱ ${stop.duration}</span>
        <span>📍 ${stop.coords[0].toFixed(4)}, ${stop.coords[1].toFixed(4)}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="stop-card__map-btn" onclick="switchTab('map'); jumpToStop(${tripStops.indexOf(stop)})">
          🗺 На карте
        </button>
        <a class="stop-card__map-btn" style="background:var(--accent);text-decoration:none"
           href="yandexnavi://map_search?text=${stop.coords[0]},${stop.coords[1]}"
           onclick="if(!this.href.startsWith('yandexnavi'))return;event.preventDefault();window.location.href=this.href">
          🧭 Яндекс.Навигатор
        </a>
        <a class="stop-card__map-btn" style="background:var(--surface2);border:1px solid var(--border);text-decoration:none"
           href="https://yandex.ru/maps/?pt=${stop.coords[1]},${stop.coords[0]}&z=15&l=map"
           target="_blank">
          🌐 Яндекс.Карты
        </a>
      </div>
    </article>
  `;
}

function renderTripStops() {
  const el = document.querySelector('#stops-list');
  if (!el) return;
  el.innerHTML = tripStops.map(renderStopCard).join('');
}

/* ===== INIT ===== */
window.addEventListener('load', () => {
  initMap();
  renderTripStops();
});
</script>
</body>
</html>
